<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado · Tema 7 Atención al Cliente</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="container">
    <section class="certificate-card">
      <div class="section-title" style="margin-top:0">
        <h1 style="margin:0">Certificado final</h1>
        <a class="btn ghost" href="index.html">Volver al tema</a>
      </div>
      <div class="cert-box" id="certBox">
        <div class="cert-row"><span class="cert-label">Nombre del estudiante:</span> <span id="certStudent"></span></div>
        <div class="cert-row"><span class="cert-label">Módulo:</span> Tema 7 Atención al Cliente</div>
        <div class="cert-row"><span class="cert-label">Ciclo:</span> Ciclo Formativo de Grado Medio en Gestión Administrativa</div>
      </div>
      <div class="notice" style="margin-top:16px">El certificado solo se considera completo cuando todas las prácticas figuran validadas y todos los test están superados con al menos 8/10.</div>
      <div class="small-actions" style="margin-top:16px">
        <button class="btn primary" id="btnPrint">Imprimir</button>
      </div>
      <div id="certStatus" style="margin-top:16px"></div>
    </section>
  </main>

  <script>
    (function(){
      const STORAGE_KEY = "cep_tema7_progress_v3";
      const raw = localStorage.getItem(STORAGE_KEY);
      const status = document.getElementById("certStatus");
      const student = document.getElementById("certStudent");
      let ok = false;
      if(raw){
        try{
          const parsed = JSON.parse(raw);
          student.textContent = parsed.profile?.student || "____________________________";
          const phases = parsed.phases || {};
          const ids = [1,2,3,4,5,6];
          ok = ids.every(id => phases[id] && phases[id].practiceValidated && phases[id].testPassed);
        }catch(e){
          student.textContent = "____________________________";
        }
      }else{
        student.textContent = "____________________________";
      }
      status.innerHTML = ok
        ? '<div class="feedback good">Registro OK de prácticas y test. El certificado está listo.</div>'
        : '<div class="feedback bad">Aún no constan todas las prácticas validadas y todos los test superados con el mínimo exigido.</div>';
      document.getElementById("btnPrint").addEventListener("click", function(){ window.print(); });
    })();
  </script>
</body>
</html>
